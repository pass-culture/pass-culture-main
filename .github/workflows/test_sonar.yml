name: "Test SonarCloud"

on:
  push:
    branches:
        - sonarcloud-for-pcapi

permissions: write-all

defaults:
  run:
    working-directory: api

jobs:
    sonar-cloud-check:
      name: "Sonar Cloud check"
      runs-on: ubuntu-latest
      steps: 
        - uses: actions/checkout@v6
        - name: "OpenID Connect Authentication"
          uses: "google-github-actions/auth@v3"
          with:
            workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
            service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}

        - name: "Get Secret"
          id: "secrets"
          uses: "google-github-actions/get-secretmanager-secrets@v3"
          with:
            secrets: |-
              SONAR_TOKEN:passculture-metier-ehp/passculture-main-sonar-token

        - name: SonarCloud scan
          uses: SonarSource/sonarqube-scan-action@master
          if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ steps.secrets.outputs.SONAR_TOKEN }}
          with:
            projectBaseDir: api
            args: -Dsonar.qualitygate.wait=false