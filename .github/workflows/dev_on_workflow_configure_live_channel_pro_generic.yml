name: "3 [on_workflow/PRO] Deploy specific version on the live channel"

on:  
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      app_version:
        type: string
        required: true
      continue_on_error:
        type: boolean
        required: false
        default: false

defaults:
  run:
    working-directory: pro

jobs:
  publish-to-live-channel:
    environment: 
      name: pro-${{ inputs.environment }}
      deployment: false
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    permissions: 
      contents: read
      id-token: write
    runs-on: ubuntu-22.04
    continue-on-error: ${{ inputs.continue_on_error }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_DEPLOY_SERVICE_ACCOUNT }}
      - uses: pass-culture/common-workflows/actions/setup-firebase-tools@IC-1390-create-setup-firebase-tools-action
      - name: "Clone version to live channel"
        id: "clone-version"
        env:
          ENV: "${{ inputs.environment }}"
          VERSION: "${{ inputs.app_version }}"
        run: |
          firebase hosting:clone "pc-pro-$ENV:$VERSION" "pc-pro-$ENV:live"
