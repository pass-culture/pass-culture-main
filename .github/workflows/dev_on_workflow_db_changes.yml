name: 99 Check Alembic Migrations for significant changes

on:
  pull_request:
    types:
      - closed
  # TODO: remove before merge
  push:
    branches:
      - fseguin/PC-40140-better-migration-notifications

jobs:
  check-significant-changes:
    # TODO: uncomment before merge
#    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: get-remote-master-sha
        run : |
          remote_master_sha=$(git ls-remote -q | grep refs/heads/master | awk '{print $1}')
          echo "remote_master_sha=$remote_master_sha" >> $GITHUB_OUTPUT

      - id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          # TODO: remove before merge
          base_sha: ${{ steps.get-remote-master-sha.outputs.remote_master_sha }}
          files: |
            api/src/pcapi/alembic/versions/**

      - uses: actions/setup-python@v6

      - name: Detect important DB changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          python api/bin/alembic_detect_significant_changes.py $file important
          done

      - name: Detect notable DB changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          python api/bin/alembic_detect_significant_changes.py $file notable
          done

