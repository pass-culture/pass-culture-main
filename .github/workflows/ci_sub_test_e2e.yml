name: 3 [CI] Test E2E

on:
  workflow_call:
    inputs:
      ENV:
        type: string
        required: true
      image:
        type: string
        required: false
        default: pcapi-tests
      tag:
        type: string
        required: true
      CACHE_BUCKET_NAME:
        type: string
        required: true

defaults:
  run:
    working-directory: pro

jobs:
  install:
    name: "Install Playwright E2E 🔧"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: Install dependencies
        run: pnpm ci

      - name: Build vite application
        env:
          ENV: ${{ inputs.ENV }}
        run: pnpm run "build:$ENV"

      - name: Save build folder
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-playwright
          if-no-files-found: error
          path: pro/build

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile', '**/docker-compose*.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Cache uv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      # FIXME: remove deprecated GH action
      - name: "Cache Workflow Conclusion"
        uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3

  run-playwright-tests:
    name: Run Playwright tests
    runs-on: ubuntu-24.04
    needs: [install]
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - uses: KengoTODA/actions-setup-docker-compose@477353946803dd64eaa44008b865b6bfc88cab4e # v1.2.4
        with:
          version: "2.40.3"

      - name: "Fix local permissions"
        run: sudo chown -R "$PCAPI_UID:$PCAPI_GID" .
        working-directory: api
        env:
          PCAPI_UID: 1000
          PCAPI_GID: 1000

      - name: Install dependencies
        run: pnpm ci

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: "Set up Cloud SDK"
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: "Compute docker image name:tag"
        id: compute-image-name
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
        run: |
          echo "image_name=$IMAGE:$TAG" | tee -a "${GITHUB_OUTPUT}"
          echo "::notice:: Running playwright e2e-tests with $IMAGE:$TAG"

      - name: "Run postgres and redis server"
        run: docker-compose -f ../docker-compose-backend.yml up postgres redis -d

      - name: "Download artifact"
        if: ${{ inputs.tag != 'latest' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}.tar
          path: ${{ runner.temp }}

      - name: "Run API server"
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          E2E_API_KEY: DummyToken
        run: |
          if [ "$TAG" != "latest" ]; then
            docker load --input "${{ runner.temp }}/$IMAGE-$TAG.tar"
          fi
          docker run \
            --name pc-api \
            --workdir /usr/src/app \
            --env-file ./../env_file \
            --tty \
            --detach \
            --network pass-culture-main_db_nw \
            --publish 5001:5001 \
            --publish 10002:10002 \
            --entrypoint bash \
            --env E2E_API_KEY=DummyToken \
            "${{ steps.compute-image-name.outputs.image_name }}" \
            -c "set -e ; flask install_postgres_extensions ; alembic upgrade pre@head ; alembic upgrade post@head ; flask install_data ; FLASK_USE_RELOADER=0 python src/pcapi/app.py"

      - name: "Wait for migrations to be run"
        uses: iFaxity/wait-on-action@a7d13170ec542bdca4ef8ac4b15e9c6aa00a6866 # v1.2.1
        with:
          resource: http://localhost:5001/health/api
          timeout: 120000

      - name: Download the build folder
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-playwright
          path: pro/build

      - name: "Serve vite preview"
        run: pnpm serve &

      - name: "Wait for front-end to listen"
        run: |
          # shellcheck disable=SC2016
          timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:3001)" != "200" ]]; do sleep 5; done' || false

      - name: "Playwright run"
        run: E2E_API_KEY=DummyToken pnpm test:e2e:ci --reporter=blob --shard="${{ matrix.shardIndex }}/${{matrix.shardTotal }}"
        env:
          E2E_API_KEY: DummyToken

      - name: "Upload Playwright report"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: report-chromium-${{ matrix.shardIndex }}
          path: pro/blob-report/
          retention-days: 30

      - name: "Show pcapi log when it fails"
        if: failure()
        run: docker logs pc-api

  merge-reposrts:
    if: ${{ !cancelled() }}
    needs: [run-playwright-tests]
    name: "Merge playwright reports"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: "Install dependencies (3 attempts)"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: pro/all-blob-reports
          pattern: report-chromium-*
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: pro/playwright-report
          retention-days: 14
