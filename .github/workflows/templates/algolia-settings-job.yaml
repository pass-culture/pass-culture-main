apiVersion: batch/v1
kind: Job
metadata:
  name: set-algolia-settings-${DATE}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 1800
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      serviceAccountName: ${SERVICE_ACCOUNT_NAME}
      containers:
        - name: pcapi-algolia-settings
          image: ${IMAGE}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: pcapi-${ENV}-api
            - configMapRef:
                name: pcapi-${ENV}-api-specific
                optional: true
            - secretRef:
                name: pcapi-${ENV}
          command:
            - "/bin/bash"
          args:
            - "-c"
            - |
              set -e
              flask set_algolia_settings artists --apply
              flask set_algolia_settings offers --apply
              flask set_algolia_settings collective_offers --apply
              flask set_algolia_settings venues --apply
      restartPolicy: Never
