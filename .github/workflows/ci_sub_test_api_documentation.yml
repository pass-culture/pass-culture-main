name: 3 [CI] Check API documentation can be built

on:
  workflow_call:
    inputs:
      doc-api-entrypoint:
        type: string
        required: false
        default: "api/documentation"

jobs:
  api-documentation-build-checks:
    name: Build check
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: "${{ inputs.doc-api-entrypoint }}/package.json"
          cache-dependency-path: "${{ inputs.doc-api-entrypoint }}/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a
      - name: "Build documentation"
        run: |
          set -e
          pnpm install
          pnpm run build
        env:
          ENV: ci-tests
        working-directory: "${{ inputs.doc-api-entrypoint }}"
