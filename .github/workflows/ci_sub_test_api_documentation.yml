name: 3 [CI] Check API documentation can be built

on:
  workflow_call:
    inputs:
      doc-api-entrypoint:
        type: string
        required: false
        default: "api/documentation"

jobs:
  api-documentation-build-checks:
    name: Build check
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "${{ inputs.doc-api-entrypoint }}/package.json"
          cache-dependency-path: "${{ inputs.doc-api-entrypoint }}/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a
      - name: "Build documentation"
        run: |
          set -e
          pnpm install
          pnpm run build
        env:
          ENV: ci-tests
        working-directory: "${{ inputs.doc-api-entrypoint }}"
