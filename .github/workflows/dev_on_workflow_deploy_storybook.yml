name: "3 [on_workflow/PRO] Storybook"

on:
  workflow_call

jobs:
  build-and-deploy-storybook:
    name: "Build and deploy Storybook"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout 🛎️"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: "pro/package.json"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5f7b7837d099ddbb8e4f2e15400434d41d78c51b
      - name: "Install dependencies"
        working-directory: pro
        # we cannot use an action like nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2 along with `working-directory`
        run: yarn install --immutable
      - name: "Build Storybook 🔧"
        working-directory: pro
        run: yarn build-storybook
      - name: "Deploy 🚀"
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "docs"
          folder: "pro/docs-build"
          clean: true
          target-folder: "docs"