name: "3 [on_workflow] Check folder changes"

on:
  workflow_call:
    outputs:
      folder_changed:
        value: ${{ jobs.check-folder-changes.outputs.folder_changed }}
    inputs:
      folder:
        type: string
        required: true
      base_sha:
        type: string
        required: false
      fetch-tags:
        type: boolean
        required: false
        default: false

jobs:
  check-folder-changes:
    name: "Check folder changes"
    runs-on: ubuntu-22.04
    outputs:
      folder_changed: ${{ steps.folder-check-changed-files.outputs.any_modified }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: ${{ inputs.fetch-tags }}
          persist-credentials: false
      - name: Get changed files
        id: folder-check-changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          base_sha: ${{ inputs.base_sha }}
          files: |
            ${{ inputs.folder }}
      - name: List all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.folder-check-changed-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file was changed"
          done
