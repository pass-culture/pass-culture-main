name: 0 [CI] Deploy PR preview

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch of pass-culture-main repository to deploy"
        required: true
      sandbox:
        description: "Sandbox to install (empty = no sandbox)"
        required: true
        default: "empty"
        type: choice
        options:
          - empty
          - industrial
          - tiny
      sandbox-args:
        description: "Arguments passed to the sandbox command"
        required: false
        default: ""
        type: string
      front-only:
        description: "Deploy only frontend (skip API deploy)"
        required: false
        default: false
        type: boolean

permissions: write-all

env:
  PASSDIRECTOR_VERSION: v0.7.0

jobs:
  deploy-preview-env-init:
    name: Init
    environment:
      name: pcapi-preview
      deployment: false
    runs-on: ubuntu-latest
    outputs:
      preview_id: ${{ steps.compute-labels.outputs.preview_id }}
      backend_url_for_pro: ${{ steps.compute-labels.outputs.backend_url_for_pro }}
      backend_url: ${{ steps.compute-labels.outputs.backend_url }}
      backoffice_url: ${{ steps.compute-labels.outputs.backoffice_url }}
      commit_sha: ${{ steps.checkout.outputs.commit }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        id: checkout
        with:
          fetch-tags: false
          ref: ${{ inputs.source_branch }}
          persist-credentials: false

      - name: Compute preview environment identifiers
        id: compute-labels
        env:
          FRONT_ONLY: ${{ inputs.front-only }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
        run: |
          PREVIEW_ID=$(echo -n "${SOURCE_BRANCH}" | sha1sum | awk '{print $1}' | cut -c1-7)
          echo "preview_id=${PREVIEW_ID}" | tee -a "$GITHUB_OUTPUT"

          backend_url=https://preview-${PREVIEW_ID}.backend.testing.passculture.team
          backoffice_url=https://preview-${PREVIEW_ID}.backoffice.testing.passculture.team

          echo "backend_url=${backend_url}" | tee -a "$GITHUB_OUTPUT"
          echo "backoffice_url=${backoffice_url}" | tee -a "$GITHUB_OUTPUT"
        
          if [ "${FRONT_ONLY}" == "true" ]; then
            echo "backend_url_for_pro=https://backend.testing.passculture.team" | tee -a "$GITHUB_OUTPUT"
          else
            echo "backend_url_for_pro=${backend_url}" | tee -a "$GITHUB_OUTPUT"
          fi

  deploy-pro-on-firebase-preview-env:
    name: Deploy preview environment for PRO
    needs:
      - deploy-preview-env-init
    uses: ./.github/workflows/cd_sub_deploy_front_pro_preview.yml
    with:
      cache_bucket_name: passculture-infra-prod-github-runner-cache
      backend_url: ${{ needs.deploy-preview-env-init.outputs.backend_url_for_pro }}
      source_branch: ${{ inputs.source_branch }}
    secrets:
      PASSCULTURE_GITHUB_ACTION_APP_ID: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID }}
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY }}

  build-pcapi:
    name: Build pcapi docker image
    needs:
      - deploy-preview-env-init
    if: inputs.front-only == false
    uses: ./.github/workflows/docker_build_image.yml
    with:
      image: pcapi
      tag: ${{ needs.deploy-preview-env-init.outputs.commit_sha }}
      base_ref: ${{ inputs.source_branch }}

  push-pcapi:
    name: Push pcapi docker image to artifact registry
    needs:
      - deploy-preview-env-init
      - build-pcapi
    if: inputs.front-only == false
    uses: ./.github/workflows/docker_push_image_passdirector.yml
    with:
      image: pcapi
      tag: ${{ needs.deploy-preview-env-init.outputs.commit_sha }}
      environment: pcapi-preview
      registry_repository: pcapi-preview
    secrets:
      PASSCULTURE_GITHUB_ACTION_APP_ID: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID }}
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY }}

  deploy-api:
    name: Deploy preview environment
    runs-on: ubuntu-latest
    environment:
      name: pcapi-preview
      deployment: true
    permissions:
      id-token: write
      contents: read
    needs:
      - deploy-preview-env-init
      - push-pcapi
      - deploy-pro-on-firebase-preview-env
    if: always() && !failure() && !cancelled() && inputs.front-only == false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
          fetch-tags: false
          persist-credentials: false

      - name: Install Argo Workflows CLI
        uses: pass-culture/common-workflows/actions/setup-argo@setup-argo/v1.0.0

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: ${{ env.PASSDIRECTOR_VERSION }}
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID }}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY }}

      - name: Authentification to Google
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          service_account: ${{ vars.PCAPI_CI_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}

      - name: Authenticate to GKE cluster
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ vars.K8S_CLUSTER_NAME }}
          project_id: ${{ vars.PROJECT_ID }}
          location: ${{ vars.LOCATION }}
          use_dns_based_endpoint: true

      - name: Deploy preview environment stack
        id: deploy-api
        shell: bash
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          WORKFLOW_TEMPLATE: ${{ vars.WORKFLOW_TEMPLATE_PROVISIONER }}
          PREVIEW_ID: ${{ needs.deploy-preview-env-init.outputs.preview_id }}
          PCAPI_IMAGE_TAG: ${{ needs.deploy-preview-env-init.outputs.commit_sha }}
          SANDBOX_ENABLED: ${{ inputs.sandbox != 'empty' }}
          SANDBOX_NAME: ${{ inputs.sandbox != 'empty' && inputs.sandbox || '' }}
          SANDBOX_ARGS: ${{ inputs.sandbox-args }}
        run: |
          passdirector workflows submit \
            --namespace "${NAMESPACE}" \
            --template "${WORKFLOW_TEMPLATE}" \
            --parameter previewId="${PREVIEW_ID}" \
            --parameter pcapiImageTag="${PCAPI_IMAGE_TAG}" \
            --parameter sandboxEnabled="${SANDBOX_ENABLED}" \
            --parameter sandboxName="${SANDBOX_NAME}" \
            --parameter sandboxArgs="${SANDBOX_ARGS}"

      - name: Publish Summary
        shell: bash
        env:
          PRO_URL: ${{ needs.deploy-pro-on-firebase-preview-env.outputs.pro_url }}
          BACKEND_URL: ${{ needs.deploy-preview-env-init.outputs.backend_url }}
          BACKOFFICE_URL: ${{ needs.deploy-preview-env-init.outputs.backoffice_url }}
        run: |
          DATE="$(date +"%Y-%m-%d-%H-%M-%S")"
          {
            echo "### :rocket: Deploy PRO summary"
            echo "| Results                              | Value                       |"
            echo "| ------------------------------------ | --------------------------- |"
            echo "| Date                                 | ${DATE}                     |"
            echo "| Branch                               | ${SOURCE_BRANCH}            |"
            echo "| Namespace                            | ${NAMESPACE}                |"
            echo "| [Pro] url                            | ${PRO_URL}                  |"
            echo "| [Back] url                           | ${BACKEND_URL}              |"
            echo "| [BO] url                             | ${BACKOFFICE_URL}           |"
          } >> "$GITHUB_STEP_SUMMARY"

  ensure-preview-env-ready:
    name: Ensure preview environment is ready (${{ matrix.service }})
    runs-on: ubuntu-latest
    environment:
      name: pcapi-preview
      deployment: false
    needs:
      - deploy-preview-env-init
      - deploy-api
    if: always() && !failure() && !cancelled() && inputs.front-only == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            url: ${{ needs.deploy-preview-env-init.outputs.backend_url }}
          - service: backoffice
            url: ${{ needs.deploy-preview-env-init.outputs.backoffice_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-tags: false
          persist-credentials: false

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: ${{ env.PASSDIRECTOR_VERSION }}
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID }}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY }}

      - name: Ensure ${{ matrix.service }} is ready
        shell: bash
        env:
          SERVICE_URL: ${{ matrix.url }}
        run: |
          passdirector pcapi get-version \
            --url "${SERVICE_URL}" \
            --retries 60 \
            --retry-interval 30 \
            --timeout 60
