name: "3 [CI] Test changes"

on:
  workflow_call:
    secrets:
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER: { required: true }
      GCP_EHP_SERVICE_ACCOUNT: { required: true }
      SLACK_BOT_TOKEN: { required: true }
      PASSCULTURE_GITHUB_ACTION_APP_ID: { required: true }
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY: { required: true }

permissions: write-all

jobs:
  compute-changes:
    name: Compute changes
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.check-api-changes.outputs.any_modified }}
      api-documentation-changed: ${{ steps.check-api-documentation-changes.outputs.any_modified }}
      pro-changed: ${{ steps.check-pro-changes.outputs.any_modified }}
      github-changed: ${{ steps.check-github-changes.outputs.any_modified }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-tags: false }
      - name: Check api folder changes
        id: check-api-changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            api/**
            !api/documentation/**
            !api/src/pcapi/scripts/**/main.py
            !api/src/pcapi/scripts/**/test_script.py
            !api/src/pcapi/scripts/**/main.sql
      - name: Check public API documentation folder changes
        id: check-api-documentation-changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with: { files: api/documentation/** }
      - name: Check pro folder changes
        id: check-pro-changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/dev_on_pull_request_workflow.yml
            .github/workflows/test_front_pro.yml
            .github/workflows/test_e2e.yml
            pro/**
      - name: Check .github folder changes
        id: check-github-changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with: { files: .github/** }
      - name: Publish Summary
        run: |
          {
            echo "### :rocket: Init Job summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| commit sha                           | ${{ github.sha }} |"
            echo "| [api] content changed                | ${{ steps.check-api-documentation-changes.outputs.any_modified }} |"
            echo "| [api-documentation] content changed  | ${{ steps.check-api-documentation-changes.outputs.any_modified }} |"
            echo "| [pro] content changed                | ${{ steps.check-pro-changes.outputs.any_modified }} |"
            echo "| [github] content changed             | ${{ steps.check-github-changes.outputs.any_modified }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  lint-github-actions:
    name: Lint GitHub actions & worflows
    needs: compute-changes
    if: needs.compute-changes.outputs.github-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-tags: false }
      - name: "Run actionlint"
        uses: pass-culture/common-workflows/actions/actionlint-check@b2eaf34df9945c76e68cffc6e4bf27037f6ea21a # v0.2

  build-backend-image:
    name: Build backend image
    needs: compute-changes
    if: |
      needs.compute-changes.outputs.api-changed == 'true' ||
      needs.compute-changes.outputs.pro-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    uses: ./.github/workflows/dev_on_workflow_build_docker_image.yml
    with:
      image: pcapi-tests
      tag: ${{ github.sha }}

  run-mypy-cop:
    name: "MyPy cop"
    needs: compute-changes
    if: |
      needs.compute-changes.outputs.api-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    uses: ./.github/workflows/dev_on_workflow_mypy_cop.yml

  check-api-client-update:
    name: Front API Client
    needs: [compute-changes, build-backend-image]
    uses: ./.github/workflows/test_api_client_update.yml
    concurrency:
      group: check-api-client-update-${{ github.ref }}
      cancel-in-progress: true
    with:
      tag: ${{ github.sha }}
      image: pcapi-tests

  test-backend:
    name: Backend
    needs: [compute-changes, build-backend-image]
    if: |
      needs.compute-changes.outputs.api-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    uses: ./.github/workflows/test_backend.yml
    with:
      tag: ${{ github.sha }}
    secrets: inherit

  test-api-documentation:
    name: Public API documentation
    needs: compute-changes
    if: |
      needs.compute-changes.outputs.api-documentation-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    uses: ./.github/workflows/test_api_documentation.yml
    secrets: inherit

  test-pro:
    name: Front Pro
    needs: compute-changes
    if: |
      needs.compute-changes.outputs.pro-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    uses: ./.github/workflows/test_front_pro.yml
    with:
      CACHE_BUCKET_NAME: "passculture-infra-prod-github-runner-cache"
    secrets: inherit

  test-pro-e2e:
    name: E2E
    needs: [compute-changes, build-backend-image]
    uses: ./.github/workflows/test_e2e.yml
    if: always() &&
      !cancelled() &&
      needs.compute-changes.outputs.api-changed == 'true' ||
      needs.compute-changes.outputs.pro-changed == 'true' ||
      needs.compute-changes.outputs.github-changed == 'true'
    with:
      ENV: "development"
      tag: ${{ github.sha }}
      CACHE_BUCKET_NAME: "passculture-infra-prod-github-runner-cache"
    secrets: inherit
