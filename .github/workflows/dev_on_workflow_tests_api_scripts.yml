name: "3 [on_workflow/API] Script tests"

on:
  workflow_call:
    inputs:
      image:
        type: string
        required: false
        default: pcapi-tests
      tag:
        type: string
        required: true
    secrets:
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_EHP_SERVICE_ACCOUNT:
        required: true

defaults:
  run:
    working-directory: api

jobs:
  pytest:
    name: "Pytest script tests"
    env:
      RUN_ENV: tests
      DATABASE_URL_TEST: postgresql://pytest:pytest@postgres:5432/pass_culture
      REDIS_URL: redis://redis:6379
      # Remove this environment variable when SQLAlchemy 2.0
      # is successfully bump
      SQLALCHEMY_WARN_20: 1
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgis/postgis:15-3.4-alpine
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_USER: pytest
          POSTGRES_PASSWORD: pytest
          POSTGRES_DB: pass_culture
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Compute docker image name:tag"
        id: compute-image-name
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
        run: echo "image_name=$IMAGE:$TAG" | tee -a "${GITHUB_OUTPUT}"
      - name: "Download artifact"
        if: ${{ inputs.tag != 'latest' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}.tar
          path: ${{ runner.temp }}
      - name: "Docker load artifact."
        if: ${{ inputs.tag != 'latest' }}
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
        run: |
          docker load --input "${{ runner.temp }}/$IMAGE-$TAG.tar"
      - name: "Authentification to Google"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: "Get Secret"
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |-
            ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER:passculture-metier-ehp/infra-prod-gcp-workload-identity-provider
            ARTIFACT_REGISTRY_SERVICE_ACCOUNT:passculture-metier-ehp/passculture-main-artifact-registry-service-account
      - name: "OpenID Connect Authentication"
        id: openid-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: false
          token_format: "access_token"
          workload_identity_provider: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER  }}
          service_account: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_SERVICE_ACCOUNT }}
      - name: "Docker login"
        id: docker-login
        uses: "docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2" # v4.0.0
        with:
          registry: "europe-west1-docker.pkg.dev"
          username: "oauth2accesstoken"
          password: "${{ steps.openid-auth.outputs.access_token }}"
      - name: "Setup database"
        run: |
          docker run \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --network "${{ job.container.network }}" \
            --env RUN_ENV --env DATABASE_URL_TEST \
            --entrypoint=bash \
            "${{ steps.compute-image-name.outputs.image_name }}" \
            -c '
              set -e
              flask install_postgres_extensions
              alembic upgrade pre@head
              alembic upgrade post@head
              flask install_data
            '
      - name: "Mount a Volume with pcapi rights"
        run: |
          docker run \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume ${{ runner.workspace }}/pass-culture-main/api/tests/:/tests \
            --network "${{ job.container.network }}" \
            --user 0 \
            --env RUN_ENV --env DATABASE_URL_TEST --env REDIS_URL \
            --entrypoint=bash \
            "${{ steps.compute-image-name.outputs.image_name }}" \
            -c '
              echo "Changing owner and group fort directory test"
              chown -R pcapi:pcapi /tests
            '
      - name: "Run pytest"
        run: |
          docker run \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume ${{ runner.workspace }}/pass-culture-main/api/tests/:/tests \
            --network "${{ job.container.network }}" \
            --entrypoint=bash \
            --env RUN_ENV --env DATABASE_URL_TEST --env REDIS_URL --env SQLALCHEMY_WARN_20 \
            "${{ steps.compute-image-name.outputs.image_name }}" \
            -c '
              pytest tests/scripts/**/test_main.py --junitxml='/tests/junit.xml' --quiet --color=yes
            '
            

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6.3.1
        if: always() # always run even if the previous step fails
        with:
          report_paths: "${{ runner.workspace }}/pass-culture-main/api/tests/junit.xml"
          check_name: "Pytest Report"
          fail_on_failure: false
          skip_success_summary: true
