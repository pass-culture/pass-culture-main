name: 3 [CI] Test frontend

on:
  workflow_call:

defaults:
  run:
    working-directory: pro

jobs:
  run-quality-checks:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a
      - name: "Cache the node_modules"
        id: "pnpm-modules-cache"
        uses: pass-culture-github-actions/cache@88f07af200f0bcf2480f9c194e3dbb9488a1902b # v1.0.0
        with:
          compression-method: "gzip"
          bucket: ${{ vars.CACHE_BUCKET }}
          path: |
            **/node_modules
          key: v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      - name: "Install dependencies (3 attempts)"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - run: pnpm typecheck
      - run: pnpm lint:dead-code
      - run: pnpm lint:dead-code:production
      - run: pnpm lint:js
      - run: pnpm lint:scss
      - run: pnpm lint:scss:checkunused

  run-unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: "OpenID Connect Authentication"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_CI_SERVICE_ACCOUNT }}

      - name: "Cache the node_modules"
        id: "pnpm-modules-cache"
        uses: pass-culture-github-actions/cache@88f07af200f0bcf2480f9c194e3dbb9488a1902b # v1.0.0
        with:
          compression-method: "gzip"
          bucket: ${{ vars.CACHE_BUCKET }}
          path: |
            **/node_modules
          key: v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: "Install dependencies (3 attempts)"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - name: Run tests with coverage
        run: pnpm test:unit:ci --reporter=blob --reporter=dot --shard=${{ matrix.shardIndex }}/${{matrix.shardTotal }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: pro/.vitest-reports/
          include-hidden-files: true
          retention-days: 1

      - name: Rename coverage
        run: mv coverage/coverage-final.json coverage/coverage-${{matrix.shardIndex}}.json

      - name: Upload coverage report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ matrix.shardIndex }}
          path: pro/coverage/*.json
          include-hidden-files: true
          retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: run-unit-tests

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to fix `Shallow clone detected during the analysis.` error on sonar side
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: "Cache the node_modules"
        id: "pnpm-modules-cache"
        uses: pass-culture-github-actions/cache@88f07af200f0bcf2480f9c194e3dbb9488a1902b # v1.0.0
        with:
          compression-method: "gzip"
          bucket: ${{ vars.CACHE_BUCKET }}
          path: |
            **/node_modules
          key: v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-pnpm-pro-dependency-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: "Install dependencies (3 attempts)"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: pro/.vitest-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: npx vitest --merge-reports --reporter=dot

      - name: Download coverage reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: pro/coverage
          pattern: coverage-report-*
          merge-multiple: true

      - name: Merge coverage reports
        run: |
          npx nyc merge coverage coverage/coverage-merged.json
          npx nyc report -t coverage --report-dir coverage --reporter lcov

      - name: "OpenID Connect Authentication"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_CI_SERVICE_ACCOUNT }}

      - name: "Get Secret"
        id: "secrets"
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |-
            SONAR_TOKEN:passculture-metier-ehp/passculture-main-sonar-token

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ steps.secrets.outputs.SONAR_TOKEN }}
        with:
          projectBaseDir: pro
          args: -Dsonar.qualitygate.wait=${{ github.event_name == 'pull_request' && 'true' || 'false'  }}
