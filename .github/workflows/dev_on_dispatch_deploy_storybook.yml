name: "[on_dispatch] Deploy preview Storybook"

on:
  workflow_dispatch:
    inputs:
      EXPIRES:
        type: string
        default: "2d"

permissions: write-all

jobs:
  build-and-deploy-storybook:
    name: "Build and deploy Storybook"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout 🛎️"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: "Get Secret"
        id: "secrets"
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |-
            FIREBASE_TOKEN:passculture-metier-ehp/pc_pro_testing_firebase_json
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "pro/package.json"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a
      - name: "Install dependencies"
        working-directory: pro
        # we cannot use an action like nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2 along with `working-directory`
        run: yarn install --immutable
      - name: "Build Storybook 🔧"
        working-directory: pro
        run: yarn build-storybook
      - name: "Deploy 🚀"
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        id: firebase-deploy
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: ${{ steps.secrets.outputs.FIREBASE_TOKEN }}
          expires: ${{ inputs.EXPIRES }}
          projectId: pc-pro-testing
          entryPoint: pro
          channelId: ${{ github.ref_name }}
          target: pc-pro-storybook
      - name: "Publish Summary"
        run: |
          {
            echo "### :rocket: Deploy PRO Storybook Summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.firebase-deploy.outputs.details_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
