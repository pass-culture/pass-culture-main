name: 3 [CD] Deploy api documentation

on:
  workflow_dispatch:
    inputs:
      environment:
        type: string
        required: true
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0

env:
  API_DOC_FOLDER: "api/documentation"

jobs:
  deploy-api-doc-on-firebase:
    name: "Deploy api doc on firebase"
    runs-on: ubuntu-22.04
    environment:
      name: api-doc-${{ inputs.environment }}
      deployment: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Authentification to Google
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.API_DOC_DEPLOY_SERVICE_ACCOUNT }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: "${{ env.API_DOC_FOLDER }}/package.json"
          cache-dependency-path: "${{ env.API_DOC_FOLDER }}/pnpm-lock.yaml"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5a1dc2af9db42434fec30b2579cc7030e2624582
      - name: Build documentation
        run: |
          set -e
          pnpm install
          pnpm run build
        env:
          ENV: ${{ inputs.environment }}
        working-directory: "${{ env.API_DOC_FOLDER }}"

      - name: Setup firebase
        env:
          FIREBASE_CLI_VERSION: ${{ inputs.firebase_cli_version }}
        run: |
          npm install -g "firebase-tools@$FIREBASE_CLI_VERSION"

      - name: Deploy API documentation
        working-directory: "${{ env.API_DOC_FOLDER }}"
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          firebase deploy --only "hosting" --project "pc-doc-api-${ENVIRONMENT}" --non-interactive
