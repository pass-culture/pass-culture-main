name: '[Deprecated] Build and push docker images to Artifact Registry'
on:
  push:

env:
  PROJECT_ID: passculture-infra-prod
  REGION: europe-west1
  REPOSITORY: pass-culture-artifact-registry

jobs:
  build-and-push-docker-images:
    name: 'Build and push Docker images'
    permissions:
      id-token: write
      contents: read
    runs-on: [docker-cache]
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ inputs.ref }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver: docker
    - name: "Build and push pcapi-tests image"
      uses: docker/build-push-action@v2
      with:
        context: api
        push: true
        target: pcapi-tests
        tags: docker-registry.docker-registry.svc.cluster.local:5000/${{ github.sha }}

  pull-image:
    name: 'Pull docker images'
    needs: build-and-push-docker-images
    permissions:
      id-token: write
      contents: read
    runs-on: [self-hosted, linux, x64]
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver: docker
    - name: Pull docker image
      run: docker pull docker-registry.docker-registry.svc.cluster.local:5000/${{ github.sha }}
