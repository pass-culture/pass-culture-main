name: 3 [CI] Deploy front PRO preview

on:
  workflow_dispatch:
    inputs:
      cache_bucket_name:
        type: string
        required: true
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0
      time_to_live:
        type: string
        required: false
        default: "2d"
      pcapi_backend_url:
        description: "Backend URL to inject into .env.testing (empty = no override)"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      cache_bucket_name:
        type: string
        required: true
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0
      time_to_live:
        type: string
        required: false
        default: "2d"
      pcapi_backend_url:
        description: "Backend URL to inject into .env.testing (empty = no override)"
        required: false
        default: ""
        type: string

      source_branch:
        type: string
        required: false
        default: ${{ github.ref_name }}
    secrets:
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY:
        required: true
      PASSCULTURE_GITHUB_ACTION_APP_ID:
        required: true
    outputs:
      pro_url:
        description: "The pro (firebase) preview URL"
        value: ${{ jobs.deploy_on_firebase.outputs.pro_url }}

permissions:
  id-token: write
  contents: read

env:
  ENV: testing

defaults:
  run:
    working-directory: pro

jobs:
  deploy_on_firebase:
    runs-on: ubuntu-22.04
    outputs:
      description: "The pro (firebase) preview URL"
      pro_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: false
          ref: ${{ inputs.source_branch }}
          persist-credentials: false

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"

      - name: Setup firebase
        env:
          FIREBASE_CLI_VERSION: ${{ inputs.firebase_cli_version }}
        run: |
          npm install -g "firebase-tools@$FIREBASE_CLI_VERSION"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          export_environment_variables: "true"
          create_credentials_file: "true"
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_PREVIEW_SERVICE_ACCOUNT }}

      - name: Override backend URL in .env.testing
        if: inputs.pcapi_backend_url != ''
        env:
          DEFAULT_BACKEND_URL: https://backend.testing.passculture.team
          BACKEND_URL: ${{ inputs.pcapi_backend_url }}
        run: |
          echo "Rewriting backend URL"
          echo "  from: ${DEFAULT_BACKEND_URL}"
          echo "  to:   ${BACKEND_URL}"
          sed -i "s|${DEFAULT_BACKEND_URL}|${BACKEND_URL}|g" src/.env.testing

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: v0.3.0
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID}}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY}}

      - name: Install dependencies (3 attempts)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - run: pnpm build:"$ENV"
        env:
          # By default NodeJS processes are limited to 512MB of memory
          # This is not enough for the build process when compiling sourcemaps
          # Increases the limit so that the build doesnt fail
          NODE_OPTIONS: --max_old_space_size=4096
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy Pro preview
        working-directory: pro
        env:
          REF_NAME: ${{ inputs.source_branch }}
          PROJECT_ID: pc-pro-testing
          TARGET: pc-pro-testing
        id: deploy
        run: |
          URL=$(passdirector firebase deploy-preview --project-id "${PROJECT_Id}" --target "${TARGET}" --channel "${REF_NAME}")
          echo "preview_url=$URL" | tee -a "$GITHUB_OUTPUT"

      - name: Publish Summary
        run: |
          {
            echo "### :rocket: Deploy PRO summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.deploy.outputs.preview_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
