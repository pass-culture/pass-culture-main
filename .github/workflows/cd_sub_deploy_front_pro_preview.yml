name: 3 [CI] Deploy front PRO preview

on:
  workflow_dispatch:
    inputs:
      cache_bucket_name:
        description: "The name of the GCP bucket to use for caching"
        type: string
        required: true
      firebase_cli_version:
        description: "Version of firebase-tools to use for deployment"
        type: string
        required: false
        default: 15.18.0
      time_to_live:
        description: "Time to live for the preview deployment (e.g., '2d' for 2 days)"
        type: string
        required: false
        default: "2d"
      backend_url:
        description: "Backend URL to inject into .env.testing (empty = no override. It will use the default backend URL https://backend.testing.passculture.team)"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      cache_bucket_name:
        type: string
        required: true
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0
      time_to_live:
        type: string
        required: false
        default: "2d"
      backend_url:
        description: "Backend URL to inject into .env.testing (empty = no override)"
        required: false
        default: ""
        type: string
      source_branch:
        type: string
        required: false
        default: ${{ github.ref_name }}
    secrets:
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY:
        required: true
      PASSCULTURE_GITHUB_ACTION_APP_ID:
        required: true
    outputs:
      pro_url:
        description: "The pro (firebase) preview URL"
        value: ${{ jobs.deploy_on_firebase.outputs.pro_url }}

permissions:
  id-token: write
  contents: read

env:
  ENV: testing

defaults:
  run:
    working-directory: pro

jobs:
  deploy_on_firebase:
    runs-on: ubuntu-22.04
    outputs:
      description: "The pro (firebase) preview URL"
      pro_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: false
          ref: ${{ inputs.source_branch }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"

      - name: Setup firebase
        env:
          FIREBASE_CLI_VERSION: ${{ inputs.firebase_cli_version }}
        run: |
          npm install -g "firebase-tools@$FIREBASE_CLI_VERSION"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          export_environment_variables: "true"
          create_credentials_file: "true"
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_PREVIEW_SERVICE_ACCOUNT }}

      - name: Override backend URL in .env.testing
        if: inputs.backend_url != ''
        env:
          BACKEND_URL: ${{ inputs.backend_url }}
        run: |
          echo "Rewriting VITE_API_URL to: ${BACKEND_URL}"
          sed -i "s|^VITE_API_URL=.*|VITE_API_URL=${BACKEND_URL}|" src/.env.testing

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: v0.7.2
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID}}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY}}

      - name: Install dependencies (3 attempts)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci

      - run: pnpm build:"$ENV"
        env:
          # By default, Node.js processes are limited to 512MB of memory
          # This is not enough for the build process when compiling sourcemaps
          # Increases the limit so that the build does not fail
          NODE_OPTIONS: --max_old_space_size=4096
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy Pro preview
        working-directory: pro
        env:
          REF_NAME: ${{ inputs.source_branch }}
          PROJECT_ID: pc-pro-testing
          TARGET: pc-pro-testing
        id: deploy
        run: |
          URL=$(passdirector firebase deploy-preview --project-id "${PROJECT_ID}" --target "${TARGET}" --channel "${REF_NAME}")
          echo "preview_url=$URL" | tee -a "$GITHUB_OUTPUT"

      - name: Publish Summary
        run: |
          {
            echo "### :rocket: Deploy PRO summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.deploy.outputs.preview_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
