name: 3 [CI] Daily Security scan

on:
  schedule:
    # “At 09:12”
    - cron: '12 9 * * *'
      timezone: "Europe/Paris"
  workflow_dispatch:

jobs:
  semgrep_scan:
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef # v1.156.0
    if: (github.actor != 'dependabot[bot]')
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          persist-credentials: false

      - name: Perform Semgrep Analysis
        run: semgrep scan --config auto . --sarif-output=semgrep-results.sarif

      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: semgrep-scan-results
          path: semgrep-results.sarif

      - name: Upload SARIF result to the GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@0e150e40762c1253b364a04b0fc9f2cc14effff2 #v4
        with:
          sarif_file: semgrep-results.sarif
