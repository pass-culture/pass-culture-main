name: "1 [on_pull_request] Ping data team on significant DB changes"

on:
  pull_request:
    types:
      - closed
  pull_request_review:
    types:
      - submitted

permissions: write-all

jobs:
  detect-significant-changes-for-data-team:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    uses: my-org/my-repo/.github/workflows/99_check_alembic_migrations.yml
    with:
      ping_data_team: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && true || false }}
    secrets: inherit

  send-slack-notification-approved:
    needs: detect-significant-changes-for-data-team
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      needs.detect-significant-changes-for-data-team.outputs.changes != ''
    uses: ./.github/workflows/dev_on_workflow_post_slack_message.yml
    with:
      channel: ${{ vars.SLACK_DB_CHANGES_CHANNEL_ID }}
      color: "#008080"
      message: "La <${{ github.event.pull_request.html_url }}|PR> a été approuvée et contient:\\n ${{ needs.detect-significant-changes-for-data-team.outputs.changes }}\\n @${{ github.event.pull_request.user.login }} merci de te synchroniser avec l'équipe data engineering avant de merger."
    secrets:
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_EHP_SERVICE_ACCOUNT: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}

  send-slack-notification-merged:
    needs: detect-significant-changes-for-data-team
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      needs.detect-significant-changes-for-data-team.outputs.changes != ''
    uses: ./.github/workflows/dev_on_workflow_post_slack_message.yml
    with:
      channel: ${{ vars.SLACK_DB_CHANGES_CHANNEL_ID }}
      color: "#008080"
      message: "La <${{ github.event.pull_request.html_url }}|PR> a été mergée et contient:\\n ${{ needs.detect-significant-changes-for-data-team.outputs.changes }}\\n veuiller synchroniser les jobs d'import et les schemas des tables concernées."
    secrets:
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_EHP_SERVICE_ACCOUNT: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
