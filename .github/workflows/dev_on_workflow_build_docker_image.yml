name: '3 [on_workflow] Build docker image'

on:
  workflow_call:
    inputs:
      image:
        description: "The docker image name"
        required: true
        type: string

      tag:
        description: "The docker image tag"
        required: true
        type: string

      base_ref:
        # The base ref to tag from.
        # Can be a branch name, a tag or a commit.
        required: false
        type: string


jobs:
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base_ref }}

      - name: Add version to api
        working-directory: api
        env:
          TAG: ${{ inputs.tag }}
        run: |
          echo "$TAG" > version.txt
          git add version.txt

      - name: Build docker image and save as github artifact
        uses: ./.github/actions/build-docker-image
        with:
          image: ${{ inputs.image }}
          context: api
          tag: ${{ inputs.tag }}
          artifact_path: |
            ./
            !./pro/scripts/generator
