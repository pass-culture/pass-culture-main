name: 0 [CI] Deploy Storybook preview

on:
  workflow_dispatch:
    inputs:
      EXPIRES:
        type: string
        default: "2d"
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0

permissions: 
  contents: read
  id-token: write

jobs:
  build-and-deploy-storybook:
    name: "Build and deploy Storybook"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout 🛎️"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: v0.3.0
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID}}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY}}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "pro/package.json"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5715b432e91814bc6ab6725ff10abf3b81d5f8d1

      - name: Setup firebase
        env:
          FIREBASE_CLI_VERSION: ${{ inputs.firebase_cli_version }}
        run: |
          npm install -g "firebase-tools@$FIREBASE_CLI_VERSION"

      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          service_account: ${{ vars.PRO_STORYBOOK_CI_SERVIE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}

      - name: "Install dependencies"
        working-directory: pro
        # we cannot use an action like nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2 along with `working-directory`
        run: yarn install --immutable

      - name: "Build Storybook 🔧"
        working-directory: pro
        run: yarn build-storybook

      - name: Deploy Storybook preview
        working-directory: pro
        id: deploy
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          URL=$(passdirector firebase deploy-preview --project-id "pc-pro-testing" --target "pc-pro-storybook" --channel "${REF_NAME}")
          echo "preview_url=$URL" | tee -a "$GITHUB_OUTPUT"

      - name: "Publish Summary"
        run: |
          {
            echo "### :rocket: Deploy PRO Storybook Summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.deploy.outputs.preview_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
