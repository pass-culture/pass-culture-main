name: 0 [CI] Deploy Storybook preview

on:
  workflow_dispatch:
    inputs:
      EXPIRES:
        type: string
        default: "2d"
      firebase_cli_version:
        type: string
        required: false
        default: 15.18.0

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy-storybook:
    name: "Build and deploy Storybook"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout 🛎️"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install passdirector
        uses: ./.github/actions/setup-passdirector
        with:
          version: v0.7.2
          github_app_id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID}}
          github_app_private_key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY}}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"

      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a

      - uses: pass-culture/common-workflows/actions/setup-firebase-tools@IC-1390-create-setup-firebase-tools-action

      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          service_account: ${{ vars.PRO_STORYBOOK_CI_SERVIE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}

      - name: "Install dependencies"
        working-directory: pro
        # we cannot use an action like nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2 along with `working-directory`
        run: pnpm ci

      - name: "Build Storybook 🔧"
        working-directory: pro
        run: pnpm build-storybook

      - name: Deploy Storybook preview
        working-directory: pro
        id: deploy
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          URL=$(passdirector firebase deploy-preview --project-id "pc-pro-testing" --target "pc-pro-storybook" --channel "${REF_NAME}")
          echo "preview_url=$URL" | tee -a "$GITHUB_OUTPUT"

      - name: "Publish Summary"
        run: |
          {
            echo "### :rocket: Deploy PRO Storybook Summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.deploy.outputs.preview_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
