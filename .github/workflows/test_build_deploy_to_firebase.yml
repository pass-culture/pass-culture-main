name: "[DEVOPS][TESTCI][Firebase] Build and Deploy to Firebase"

on:
  # push:
  #   branches:
  #     - feature/host-pc-doc-api
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      APPNAME:
        type: string
        required: true
      ENTRYPOINT:
        type: string
        required: true
      CHANNEL:
        type: string
        required: false
      REF:
        type: string
        required: true
      EXPIRES:
        type: string
        required: true
        default: '7d'
    secrets:
      GCP_EHP_SERVICE_ACCOUNT:
        required: true
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER:
        required: true

jobs:
  get_firebase_token:
    runs-on: ubuntu-latest
    steps:
      # - uses: actions/checkout@v4.1.7
      #   with:
      #     ref: ${{ inputs.REF }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '${{ inputs.ENTRYPOINT }}/.nvmrc'
      - name: "Build documentation"
        run: |
            set -e
            npm install
            npm run build
        env:
          ENV: ${{ inputs.environment }}
        working-directory: '${{ inputs.ENTRYPOINT }}'
