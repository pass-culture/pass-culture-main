name: 3 [CD] Deploy front PRO

on:
  workflow_call:
    inputs:
      ENV:
        type: string
        required: true
      PUSH_RELEASE_TO_SENTRY:
        description: "If true, creates a release in Sentry and uploads sourcemaps"
        type: boolean
        default: false
      CHANNEL:
        type: string
        required: true
      EXPIRES:
        type: string
        default: "2d"
      REF:
        type: string
        required: true
      CACHE_BUCKET_NAME:
        type: string
        required: true
      resource_label:
        type: string
        # TODO check if a default is needed
        default: ""
      continue_on_error:
        type: boolean
        required: false
        default: false
      version:
        type: string
        required: true
    outputs:
      pro_url:
        description: "The pro (firebase) preview URL"
        value: ${{ jobs.deploy_on_firebase.outputs.pro_url }}

defaults:
  run:
    working-directory: pro

jobs:
  deploy_on_firebase:
    environment:
      name: pro-${{ inputs.ENV }}
      deployment: false
    runs-on: ubuntu-22.04
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    outputs:
      description: "The pro (firebase) preview URL"
      pro_url: ${{ steps.firebase-deploy.outputs.details_url }}
    continue-on-error: ${{ inputs.continue_on_error }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.REF }}
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.11.0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@5a1dc2af9db42434fec30b2579cc7030e2624582
      - name: "OpenID Connect Authentication"
        id: "openid-auth"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          export_environment_variables: "true"
          create_credentials_file: "true"
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ vars.PRO_DEPLOY_SERVICE_ACCOUNT }}
      - name: "Get Secret"
        id: "secrets"
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |-
            SAAS_SENTRY_TOKEN:passculture-metier-ehp/passculture-app-pro-saas-sentry-token
      - if: inputs.resource_label != ''
        env:
          RESOURCE_LABEL: ${{ inputs.resource_label }}
        run: |
          sed -i "s/https:\/\/backend.testing.passculture.team/https:\/\/backend-$RESOURCE_LABEL.testing.passculture.team/g" src/.env.testing
      - name: "Install dependencies (3 attempts)"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: |
            cd pro
            pnpm ci
      - run: pnpm build:"$ENV"
        env:
          # By default NodeJS processes are limited to 512MB of memory
          # This is not enough for the build process when compiling sourcemaps
          # Increases the limit so that the build doesnt fail
          NODE_OPTIONS: --max_old_space_size=4096
          ENV: ${{ inputs.ENV }}
          VITE_APP_VERSION: ${{ inputs.version }}
      - if: inputs.ENV != 'testing'
        run: |
          grep -E '"version": "[0-9]+.[0-9]+.[0-9]+"' package.json | grep -Eo '[0-9]+.[0-9]+.[0-9]+' > build/version.txt
      - name: "Create SaaS Sentry release"
        if: ${{ inputs.PUSH_RELEASE_TO_SENTRY }}
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ steps.secrets.outputs.SAAS_SENTRY_TOKEN }}
          SENTRY_ORG: pass-culture
          SENTRY_PROJECT: pro
        with:
          sourcemaps: ./build
          working_directory: pro
          version: ${{ inputs.CHANNEL }}
          url_prefix: "~"
      - name: Create service account key
        id: create-sa-key
        run: |
          gcloud iam service-accounts keys create temporary-sa-key.json \
            --iam-account=${{ vars.PRO_DEPLOY_SERVICE_ACCOUNT }} \
            --project=${{ steps.openid-auth.outputs.project_id }}
          SA_KEY_JSON=$(jq -c . temporary-sa-key.json) # make the JSON compact to set it as an output variable
          echo "FIREBASE_SERVICE_ACCOUNT=$SA_KEY_JSON" >> "$GITHUB_OUTPUT"
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        id: firebase-deploy
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: ${{ steps.create-sa-key.outputs.FIREBASE_SERVICE_ACCOUNT }}
          expires: ${{ inputs.EXPIRES }}
          projectId: pc-pro-${{ inputs.ENV }}
          entryPoint: pro
          channelId: ${{ inputs.CHANNEL }}
          target: pc-pro-${{ inputs.ENV }}

      - name: Delete service account key
        if: always()
        run: |
          if [ -f "temporary-sa-key.json" ]; then
            echo "Service account key file exists, deleting the key and the file"
            KEY_ID=$(jq -r .private_key_id temporary-sa-key.json)
            gcloud iam service-accounts keys delete "$KEY_ID" \
              --iam-account=${{ vars.PRO_DEPLOY_SERVICE_ACCOUNT }} \
              --project=${{ steps.openid-auth.outputs.project_id }} \
              --quiet
            rm -f temporary-sa-key.json
          fi
      - name: "Publish Summary"
        run: |
          {
            echo "### :rocket: Deploy PRO summary"
            echo "| Results                              | Value |"
            echo "| ------------------------------------ | ----- |"
            echo "| [pro] preview url                    |  ${{ steps.firebase-deploy.outputs.details_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
