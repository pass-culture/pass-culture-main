name: "[DEVOPS][TESTCI] 3 [on_workflow] Deploy"
on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      app_version:
        type: string
        required: false
      deploy_api:
        type: boolean
        required: false
        default: false
      deploy_pro:
        type: boolean
        required: false
        default: false
      ENTRYPOINT:
        type: string
        # required: true
        default: 'api/documentation'
    secrets:
      GCP_EHP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_EHP_SERVICE_ACCOUNT:
        required: true

jobs:
  deploy-api-doc-on-firebase:
    name: "Deploy api"
    if: ${{ inputs.deploy_api }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4.1.7
      - name: "Authentification to Google"
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}

      - name: "list files"
        run: find ./.github/

      - uses: actions/setup-node@v4
        with:
          node-version-file: '${{ inputs.ENTRYPOINT }}/.nvmrc'
      - name: "Build documentation"
        run: |
            set -e
            npm install
            npm run build
        env:
          ENV: ${{ inputs.environment }}
        working-directory: '${{ inputs.ENTRYPOINT }}'
