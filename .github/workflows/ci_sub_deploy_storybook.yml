name: 3 [CI] Build and deploy Storybook

on: workflow_call

jobs:
  build-and-deploy-storybook:
    name: Build and deploy Storybook
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.11.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: "pro/package.json"
          cache-dependency-path: "pro/pnpm-lock.yaml"
      - uses: pass-culture/common-workflows/actions/setup-safe-chain@afae2577022181fccdaead9537235886c461f36a
      - run: pnpm ci
        working-directory: pro
      - run: pnpm build-storybook
        working-directory: pro
      - name: Deploy Storybook on GitHub pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "docs"
          folder: "pro/docs-build"
          clean: true
          target-folder: "docs"
