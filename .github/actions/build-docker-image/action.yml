name: 'Build docker image and saved it as github artifact'
description: 'Build a docker image from the context directory and save it as a github artifact'
inputs:
  image:
    description: The docker image name
    required: true

  context:
    description: The build context directory
    required: true

  tag:
    description: The docker image tag
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build docker image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.context }}
        target: ${{ inputs.image }}
        tags: ${{ inputs.image }}:${{ inputs.tag }}
        cache-from: type=gha,scope=${{ inputs.image }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image }}
        outputs: type=docker,dest=${{ runner.temp }}/${{ inputs.image }}-${{ inputs.tag }}.tar

    - name: Upload built image to github artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.image }}-${{ inputs.tag }}.tar
        path: ${{ runner.temp }}/${{ inputs.image }}-${{ inputs.tag }}.tar
        retention-days: 1
